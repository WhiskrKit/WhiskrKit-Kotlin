name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Unit tests (incl. architecture rules)
        run: ./gradlew :whiskrkit:testDebugUnitTest

      - name: Screenshot tests
        run: ./gradlew :whiskrkit:verifyRoborazziDebug

      - name: Public API compatibility
        run: ./gradlew apiCheck

      - name: Assemble library and minified sample
        run: ./gradlew :whiskrkit:assembleRelease :sample:assembleRelease

      - name: Upload screenshot diffs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: roborazzi-reports
          path: whiskrkit/build/outputs/roborazzi/
          if-no-files-found: ignore
